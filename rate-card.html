<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #151515; color: #f0ede6; font-family: var(--font-primary, 'Inter', sans-serif); }

.rc-wrapper {
    max-width: 600px;
    margin: 0 auto;
    padding: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

.main-header {
    padding: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.hero {
    padding: 20px;
}

.hero-title {
    font-family: var(--font-handwritten, 'Reenie Beanie', cursive);
    font-size: 42px;
    color: #c8f000;
    letter-spacing: 1px;
    margin-bottom: 5px;
}
.hero-title span {
    font-family: var(--font-primary, 'Inter', sans-serif);
    font-size: 16px;
    color: #5c5b5b;
    letter-spacing: 1px;
}

.cur-row {
    display: flex;
    gap: 8px;
    margin-top: -30px;
    justify-content: flex-end;
}

.cb {
    font-family: var(--font-primary, 'Inter', sans-serif);
    font-size: 12px;
    font-weight: 600;
    padding: 6px 12px;
    background: transparent;
    border: 1px solid #2a2a2a;
    color: #5c5b5b;
    cursor: pointer;
    border-radius: 20px;
    transition: all .15s;
}
.cb.on {
    background: #c8f000;
    color: #0d0d0d;
    border-color: #c8f000;
}

.hero-sub {
    font-size: 16px;
    color: #e0ddd6;
    line-height: 1.5;
    margin-top: 10px;
    font-weight: 500;
}

.top-est {
    display: flex;
    align-items: center;
    gap: 10px;
    background: transparent;
    border: 1px solid #2a2a2a;
    border-radius: 24px;
    padding: 8px 16px;
    width: fit-content;
    margin-top: 20px;
}
.te-label {
    font-family: var(--font-handwritten, 'Reenie Beanie', cursive);
    font-size: 22px;
    color: #c8f000;
    letter-spacing: 1px;
}
.te-badge {
    background: #f0ede6;
    color: #0d0d0d;
    font-weight: 600;
    font-size: 14px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}
.te-amt {
    font-size: 18px;
    color: #f0ede6;
    font-weight: 600;
}

.search-row {
    padding: 10px 20px 20px;
}
.srch {
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid #2a2a2a;
    padding-bottom: 10px;
}
.srch svg {
    color: #5c5b5b;
}
.srch input {
    background: transparent;
    border: none;
    outline: none;
    color: #f0ede6;
    font-family: var(--font-primary, 'Inter', sans-serif);
    font-size: 15px;
    width: 100%;
}
.srch input::placeholder {
    color: #5c5b5b;
}

/* ESTIMATE PANEL */
.panel-wrapper {
    padding: 0 20px 30px;
}
.panel {
    background: #050505;
    border: 1px solid #c8f000;
    border-radius: 16px;
    padding: 24px;
    display: flex;
    flex-direction: column;
}
.p-title {
    font-family: var(--font-handwritten, 'Reenie Beanie', cursive);
    font-size: 32px;
    color: #c8f000;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
}
.pitems {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 24px;
}

/* List Item Card */
.ric {
    background: transparent;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 16px;
    display: flex;
    justify-content: space-between;
    gap: 16px;
    position: relative;
    transition: border-color 0.2s;
    cursor: pointer;
}
.ric:hover {
    border-color: #5c5b5b;
}
.ric-left {
    flex: 1;
}
.ric-title {
    font-size: 15px;
    color: #f0ede6;
    font-weight: 600;
    margin-bottom: 4px;
}
.ric-desc {
    font-size: 12px;
    color: #5c5b5b;
    margin-bottom: 8px;
}
.ric-base {
    font-size: 13px;
    color: #f0ede6;
}
.ric-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    justify-content: space-between;
}
.ric-close {
    position: absolute;
    top: 12px;
    right: 12px;
    color: #f0ede6;
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    background: none;
    border: none;
}
.ric-total {
    font-size: 14px;
    color: #f0ede6;
    font-weight: 600;
    margin-top: 24px;
    margin-bottom: 8px;
}
.ric-counter {
    display: flex;
    align-items: center;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 4px;
    overflow: hidden;
}
.ric-counter button {
    background: transparent;
    border: none;
    color: #f0ede6;
    padding: 4px 10px;
    cursor: pointer;
    font-size: 14px;
}
.ric-counter button:hover {
    background: #2a2a2a;
}
.ric-counter span {
    color: #f0ede6;
    font-size: 13px;
    min-width: 20px;
    text-align: center;
}

.ptotal {
    border-top: 1px solid #2a2a2a;
    padding-top: 24px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
}
.pt-label {
    font-family: var(--font-handwritten, 'Reenie Beanie', cursive);
    font-size: 28px;
    color: #c8f000;
    letter-spacing: 1px;
}
.pt-main-col {
    text-align: right;
}
.pt-main {
    font-size: 24px;
    color: #f0ede6;
    font-weight: 600;
}
.pt-sub {
    font-size: 14px;
    color: #5c5b5b;
    margin-top: 4px;
}

.pbtns {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 24px;
}
.pbtn {
    width: 100%;
    padding: 16px;
    font-family: var(--font-primary, 'Inter', sans-serif);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 24px;
    transition: all .15s;
    text-align: center;
}
.pbtn-pri {
    background: #f0ede6;
    color: #0d0d0d;
    border: none;
}
.pbtn-pri:hover {
    background: #c8f000;
}
.pbtn-sec {
    background: transparent;
    color: #f0ede6;
    border: 1px solid #2a2a2a;
}
.pbtn-sec:hover {
    border-color: #5c5b5b;
}

/* TABS */
.ftabs {
    display: flex;
    gap: 24px;
    padding: 0 20px 10px;
    overflow-x: auto;
    border-bottom: 1px solid #2a2a2a;
    scrollbar-width: none;
}
.ftabs::-webkit-scrollbar { display: none; }
.ft {
    font-family: var(--font-handwritten, 'Reenie Beanie', cursive);
    font-size: 24px;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: #5c5b5b;
    cursor: pointer;
    white-space: nowrap;
    padding-bottom: 8px;
    transition: all .15s;
}
.ft.on {
    color: #c8f000;
    border-bottom-color: #c8f000;
}
.ft sup {
    font-size: 12px;
    margin-left: 4px;
}

/* LIST */
.slist {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.sec-h {
    font-family: var(--font-handwritten, 'Reenie Beanie', cursive);
    font-size: 28px;
    color: #c8f000;
    margin: 24px 0 12px;
}
.sub-h {
    font-size: 14px;
    color: #5c5b5b;
    font-weight: 600;
    margin-bottom: 12px;
    margin-top: 12px;
}

.pempty {
    color: #5c5b5b;
    text-align: center;
    padding: 40px 0;
}
</style>
</head>

  {id:'b12',cat:'branding',sec:'Branding',sub:'Print & Marketing',name:'Business Card',desc:'Single or double sided',n:[12000,22000],u:[9,16]},
  {id:'b13',cat:'branding',sec:'Branding',sub:'Print & Marketing',name:'Flyer A5/A4',desc:'Single or double sided',n:[15000,30000],u:[11,22]},
  {id:'b14',cat:'branding',sec:'Branding',sub:'Print & Marketing',name:'Event Poster',desc:'A3/A2 event or promo poster',n:[18000,35000],u:[13,25]},
  {id:'b15',cat:'branding',sec:'Branding',sub:'Print & Marketing',name:'Packaging Design',desc:'Box, sachet, label, wrap',n:[50000,130000],u:[35,90]},
  {id:'b16',cat:'branding',sec:'Branding',sub:'Print & Marketing',name:'Product Label',desc:'Bottle, jar, sticker label',n:[20000,50000],u:[14,35]},
  {id:'b17',cat:'branding',sec:'Branding',sub:'Print & Marketing',name:'T-shirt / Merch Design',desc:'Wearable print design',n:[15000,35000],u:[11,25]},
  {id:'b18',cat:'branding',sec:'Branding',sub:'Presentations',name:'Pitch Deck (10 slides)',desc:'Investor / business pitch',n:[70000,140000],u:[49,98]},
  {id:'b19',cat:'branding',sec:'Branding',sub:'Presentations',name:'Pitch Deck (20 slides)',desc:'Full detailed deck',n:[120000,230000],u:[84,160]},
  {id:'b20',cat:'branding',sec:'Branding',sub:'Presentations',name:'Company Profile',desc:'8–16-page PDF document',n:[80000,180000],u:[56,126]},
  {id:'b21',cat:'branding',sec:'Branding',sub:'Presentations',name:'Infographic',desc:'Single-page visual data design',n:[20000,50000],u:[14,35]},

  {id:'m7',cat:'motion',sec:'Motion Design',sub:'Promo & Ad Videos',name:'Animated Promo (30 sec)',desc:'Full short commercial',n:[75000,150000],u:[53,105]},
  {id:'m8',cat:'motion',sec:'Motion Design',sub:'Promo & Ad Videos',name:'Animated Promo (60 sec)',desc:'1-minute brand video',n:[120000,220000],u:[84,154]},
  {id:'m9',cat:'motion',sec:'Motion Design',sub:'Promo & Ad Videos',name:'Social Media Ad (Reel)',desc:'15–30 sec motion ad',n:[50000,80000],u:[35,56]},
  {id:'m10',cat:'motion',sec:'Motion Design',sub:'Promo & Ad Videos',name:'Explainer Video (60 sec)',desc:'Animated explainer with voiceover sync',n:[120000,280000],u:[84,196]},
  {id:'m11',cat:'motion',sec:'Motion Design',sub:'Promo & Ad Videos',name:'Explainer Video (2 min)',desc:'Full brand story explainer',n:[220000,500000],u:[154,350]},
  {id:'m12',cat:'motion',sec:'Motion Design',sub:'Video Editing',name:'Short-form Edit (Reel/TikTok)',desc:'Per video edit',n:[12000,28000],u:[9,20]},
  {id:'m13',cat:'motion',sec:'Motion Design',sub:'Video Editing',name:'YouTube Edit (10 min)',desc:'Full edit with graphics',n:[45000,90000],u:[32,63]},
  {id:'m14',cat:'motion',sec:'Motion Design',sub:'Video Editing',name:'Corporate Video Edit',desc:'Event, interview, documentary',n:[80000,220000],u:[56,154]},
  {id:'m15',cat:'motion',sec:'Motion Design',sub:'Video Editing',name:'Color Grading',desc:'Per video grade',n:[22000,55000],u:[16,38]},
  {id:'m16',cat:'motion',sec:'Motion Design',sub:'Motion Assets',name:'Lower Thirds Pack (5)',desc:'5 branded animated bars',n:[35000,65000],u:[25,46]},
  {id:'m17',cat:'motion',sec:'Motion Design',sub:'Motion Assets',name:'Animated Infographic',desc:'Data visualized in motion',n:[45000,100000],u:[32,70]},
  {id:'m18',cat:'motion',sec:'Motion Design',sub:'Motion Assets',name:'Custom Transition Pack',desc:'Brand-specific transitions',n:[28000,70000],u:[20,49]},
  {id:'m19',cat:'motion',sec:'Motion Design',sub:'Motion Assets',name:'Animated Social Post',desc:'Single motion post (GIF/MP4)',n:[25000,30000],u:[18,22]},

  {id:'w2',cat:'website',sec:'Web/UI Design',sub:'Website Packages',name:'Basic Website',desc:'3–5 pages, Framer/Webflow',n:[350000,560000],u:[250,400]},
  {id:'w3',cat:'website',sec:'Web/UI Design',sub:'Website Packages',name:'Business Website',desc:'5–8 pages + contact form + basic SEO',n:[380000,600000],u:[266,420]},
  {id:'w4',cat:'website',sec:'Web/UI Design',sub:'Website Packages',name:'Portfolio Website',desc:'Creative/personal portfolio',n:[320000,350000],u:[220,250]},
  {id:'w5',cat:'website',sec:'Web/UI Design',sub:'Website Packages',name:'E-commerce (Small)',desc:'Up to 50 products + payment integration',n:[550000,900000],u:[385,630]},
  {id:'w6',cat:'website',sec:'Web/UI Design',sub:'Website Packages',name:'E-commerce (Large)',desc:'50–200 products, full setup',n:[900000,1800000],u:[630,1260]},
  {id:'w7',cat:'website',sec:'Web/UI Design',sub:'Website Packages',name:'Blog Website',desc:'Blog + CMS setup',n:[220000,400000],u:[154,280]},
  {id:'w8',cat:'website',sec:'Web/UI Design',sub:'Website Packages',name:'Real Estate Website',desc:'Listings + filters + enquiry form',n:[550000,1100000],u:[385,770]},
];

let cur='usd', filt='all', cart={};

function nFmt(v) { return v.toLocaleString(); }

function render(){
  const q=document.getElementById('srch-in').value.toLowerCase();
  const cats={all:0,motion:0,branding:0,website:0};
  SVC.forEach(s=>cats[s.cat]++);
  cats.all=SVC.length;
  Object.keys(cats).forEach(k=>{const el=document.getElementById('ct-'+k);if(el)el.textContent=cats[k];});
  
  const list=document.getElementById('slist');
  let html='', lsec='', lsub='';
  const vis=SVC.filter(s=>(filt==='all'||s.cat===filt)&&(!q||s.name.toLowerCase().includes(q)||s.desc.toLowerCase().includes(q)||s.sub.toLowerCase().includes(q)));
  
  vis.forEach(s=>{
    if(s.sec!==lsec){html+=`<div class="sec-h">${s.sec}</div>`;lsec=s.sec;lsub='';}
    if(s.sub!==lsub){html+=`<div class="sub-h">${s.sub}</div>`;lsub=s.sub;}
    
    const qty = cart[s.id] ? cart[s.id].qty : 0;
    const baseP = cur === 'usd' ? s.u : s.n;
    const sym = cur === 'usd' ? '$' : '₦';
    
    html+=`<div class="ric" onclick="if(!cart['${s.id}']) add('${s.id}')">
      <div class="ric-left">
        <div class="ric-title">${s.name}</div>
        <div class="ric-desc">${s.desc}</div>
        <div class="ric-base">${sym}${nFmt(baseP[0])} - ${sym}${nFmt(baseP[1])}</div>
      </div>
      <div class="ric-right">
        ${qty > 0 ? `<div class="ric-total">${qty} Logos = ${sym}${nFmt(baseP[0]*qty)}</div>` : `<div style="margin-top:24px;margin-bottom:8px;"></div>`}
        <div class="ric-counter" style="opacity: ${qty > 0 ? 1 : 0.3}; pointer-events: ${qty > 0 ? 'auto' : 'none'};">
            <button onclick="event.stopPropagation(); adj('${s.id}', -1)">-</button>
            <span>${qty}</span>
            <button onclick="event.stopPropagation(); adj('${s.id}', 1)">+</button>
        </div>
      </div>
    </div>`;
  });
  
  if(!vis.length) html='<div class="pempty">No services match.</div>';
  list.innerHTML=html;
  renderPanel();
}

function add(id){
  const s=SVC.find(x=>x.id===id);
  if(s) cart[id]={s, qty:1};
  render();
}

function adj(id, d){
  if(!cart[id]) return;
  cart[id].qty += d;
  if(cart[id].qty <= 0) delete cart[id];
  render();
}

function rmItem(id){
  delete cart[id];
  render();
}

function clearAll(){
  cart={};
  render();
}

function renderPanel(){
  const items=Object.values(cart);
  const ct=items.length;
  document.getElementById('pbadge').textContent=ct;
  document.getElementById('bar-ct').textContent=ct;
  const pi=document.getElementById('pitems');
  
  if(!ct){
    pi.innerHTML='<div class="pempty">Click any service to add it</div>';
    document.getElementById('pt-main').textContent='—';
    document.getElementById('pt-sub').textContent='';
    document.getElementById('bar-amt').textContent='—';
    return;
  }
  
  let html='';
  items.forEach(({s,qty})=>{
    const baseP = cur === 'usd' ? s.u : s.n;
    const sym = cur === 'usd' ? '$' : '₦';
    
    html+=`<div class="ric" style="border-color:#c8f000;">
      <button class="ric-close" onclick="rmItem('${s.id}')">×</button>
      <div class="ric-left">
        <div class="ric-title">${s.name}</div>
        <div class="ric-desc">${s.desc}</div>
        <div class="ric-base" style="color:#c8f000;">${sym}${nFmt(baseP[0])} - ${sym}${nFmt(baseP[1])}</div>
      </div>
      <div class="ric-right" style="justify-content: flex-end;">
        <div class="ric-total">${qty} Logos = ${sym}${nFmt(baseP[0]*qty)}</div>
        <div class="ric-counter">
            <button onclick="event.stopPropagation(); adj('${s.id}', -1)">-</button>
            <span>${qty}</span>
            <button onclick="event.stopPropagation(); adj('${s.id}', 1)">+</button>
        </div>
      </div>
    </div>`;
  });
  pi.innerHTML=html;
  
  const minTot = items.reduce((a, {s,qty}) => a + (cur==='usd'?s.u[0]:s.n[0])*qty, 0);
  const maxTot = items.reduce((a, {s,qty}) => a + (cur==='usd'?s.u[1]:s.n[1])*qty, 0);
  const sym = cur === 'usd' ? '$' : '₦';
  
  document.getElementById('pt-main').textContent = `${sym}${nFmt(minTot)}`;
  document.getElementById('bar-amt').textContent = `${sym}${nFmt(minTot)}`;
  
  if(cur==='ngn'){
    const conv = minTot / 1430;
    document.getElementById('pt-sub').textContent = `$${nFmt(Math.round(conv))}`;
  } else {
    document.getElementById('pt-sub').textContent = ``;
  }
}

function setCur(c){
  cur=c;
  document.querySelectorAll('.cb').forEach(b=>b.classList.remove('on'));
  document.getElementById('cb-'+c).classList.add('on');
  render();
}

function setF(f,btn){
  filt=f;
  document.querySelectorAll('.ft').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

render();
</script>
</body>
</html>
