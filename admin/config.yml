backend:
  name: git-gateway
  branch: main
  # Set your repository name below if you are not using Netlify's Git Gateway
  # repo: your-github-username/your-repo-name

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "projects"
    label: "Projects"
    folder: "content/projects"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Thumbnail", name: "thumbnail", widget: "image", required: false}
      - {label: "Category", name: "category", widget: "select", options: ["Motion", "Branding", "Website"]}

  - name: "testimonials"
    label: "Testimonials"
    folder: "content/testimonials"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Author Name", name: "author", widget: "string"}
      - {label: "Author Role/Company", name: "role", widget: "string"}
      - {label: "Quote", name: "quote", widget: "text"}
      - {label: "Logo", name: "logo", widget: "image", required: false}
