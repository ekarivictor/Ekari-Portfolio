backend:
  name: git-gateway
  branch: main
  # Set your repository name below if you are not using Netlify's Git Gateway
  # repo: your-github-username/your-repo-name

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "projects"
    label: "Projects"
    files:
      - file: "data/projects.json"
        label: "Projects List"
        name: "projects_list"
        fields:
          - name: "items"
            label: "Projects"
            widget: "list"
            fields:
              - {label: "Order Number", name: "order", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
              - {label: "Category", name: "category", widget: "select", options: ["All", "Motion", "Branding", "Website"]}
              - {label: "Image Placeholder", name: "image", widget: "image"}
              - {label: "Hover Media (Video/Gif)", name: "hoverMedia", widget: "file", required: false}
              - {label: "Year", name: "year", widget: "string"}
              - {label: "Live Link", name: "link", widget: "string", required: false}
              - {label: "Project Logo", name: "logo", widget: "image", required: false}
              - {label: "Role", name: "role", widget: "string", required: false}
              - {label: "Timeline", name: "timeline", widget: "string", required: false}
              - {label: "About Text", name: "aboutText", widget: "markdown", required: false}
              - {label: "The Challenge (Main Content)", name: "challengeText", widget: "markdown", required: false}

  - name: "testimonials"
    label: "Testimonials"
    folder: "content/testimonials"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Author Name", name: "author", widget: "string"}
      - {label: "Author Role/Company", name: "role", widget: "string"}
      - {label: "Quote", name: "quote", widget: "text"}
      - {label: "Logo", name: "logo", widget: "image", required: false}

  - name: "gallery"
    label: "Photo Gallery"
    files:
      - file: "data/gallery.json"
        label: "Gallery Items"
        name: "gallery_list"
        fields:
          - name: "items"
            label: "Photos"
            widget: "list"
            fields:
              - {label: "Image", name: "image", widget: "image", required: false}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}

  - name: "pages"
    label: "Pages (Site Text)"
    files:
      - file: "data/home.json"
        label: "Home Page"
        name: "home"
        fields:
          - {label: "Homepage Intro Text", name: "introText", widget: "text"}
          - {label: "Footer Contact Header", name: "contactHeader", widget: "string"}
          - {label: "Footer Contact Subtext", name: "contactSubtext", widget: "string"}
      
      - file: "data/about.json"
        label: "About Page"
        name: "about"
        fields:
          - {label: "Hero Title", name: "heroTitle", widget: "string"}
          - {label: "Bio Paragraphs (Rich Text)", name: "heroBio", widget: "markdown"}
          - {label: "Philosophy Text", name: "philosophy", widget: "string"}
          - label: "Skills List"
            name: "skills"
            widget: "list"
            field: {label: "Skill", name: "skill", widget: "string"}
          - label: "Hobbies List"
            name: "hobbies"
            widget: "list"
            field: {label: "Hobby", name: "hobby", widget: "string"}
